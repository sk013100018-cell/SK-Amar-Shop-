<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Panel | EarnCash</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --secondary: #1e40af; --bg: #f3f4f6; --white: #fff; --text: #333; --success: #10b981; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); }
        
        /* Auth Screen */
        #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--primary); }
        .auth-box { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .auth-box h2 { text-align: center; margin-bottom: 20px; color: var(--primary); }
        
        /* Main Layout */
        #main-wrapper { display: none; }
        .sidebar { width: 250px; background: var(--primary); height: 100vh; position: fixed; color: white; padding: 20px; }
        .content { margin-left: 250px; padding: 30px; transition: 0.3s; }
        .sidebar h2 { margin-bottom: 30px; font-size: 24px; text-align: center; }
        .nav-link { display: block; color: white; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        .nav-link:hover, .active-nav { background: var(--secondary); }

        /* Components */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card h3 { font-size: 14px; color: #666; }
        .card p { font-size: 22px; font-weight: bold; color: var(--primary); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-p { background: var(--primary); color: white; }
        .section { display: none; }
        .active-section { display: block; }

        @media (max-width: 768px) {
            .sidebar { width: 60px; padding: 10px; }
            .sidebar h2, .nav-link span { display: none; }
            .content { margin-left: 60px; }
        }
    </style>
</head>
<body>

    <!-- Auth System -->
    <div id="auth-screen">
        <div class="auth-box" id="login-form">
            <h2>User Login</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPass" placeholder="Password">
            <button class="btn btn-p" onclick="login()">Login</button>
            <p style="margin-top:15px; text-align:center">No account? <a href="#" onclick="toggleAuth(false)">Register</a></p>
        </div>

        <div class="auth-box" id="register-form" style="display:none">
            <h2>User Register</h2>
            <input type="text" id="regName" placeholder="Full Name">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPass" placeholder="Password">
            <input type="text" id="refCodeInput" placeholder="Referral Code (Optional)">
            <button class="btn btn-p" onclick="register()">Create Account</button>
            <p style="margin-top:15px; text-align:center">Have account? <a href="#" onclick="toggleAuth(true)">Login</a></p>
        </div>
    </div>

    <!-- User Dashboard -->
    <div id="main-wrapper">
        <div class="sidebar">
            <h2>EarnCash</h2>
            <div class="nav-link active-nav" onclick="showSection('dash')"><i class="fa fa-home"></i> <span>Dashboard</span></div>
            <div class="nav-link" onclick="showSection('tasks')"><i class="fa fa-tasks"></i> <span>Tasks</span></div>
            <div class="nav-link" onclick="showSection('wallet')"><i class="fa fa-wallet"></i> <span>Wallet</span></div>
            <div class="nav-link" onclick="logout()"><i class="fa fa-sign-out"></i> <span>Logout</span></div>
        </div>

        <div class="content">
            <!-- Dashboard Section -->
            <div id="dash" class="section active-section">
                <h1>Welcome, <span id="u-name">User</span></h1>
                <div class="card-grid">
                    <div class="card"><h3>Balance</h3><p>৳ <span id="u-balance">0</span></p></div>
                    <div class="card"><h3>Referral Code</h3><p id="u-refcode">...</p></div>
                    <div class="card"><h3>Daily Bonus</h3><button onclick="claimBonus()" class="btn btn-p" style="margin-top:10px">Claim</button></div>
                </div>
            </div>

            <!-- Tasks Section -->
            <div id="tasks" class="section">
                <h1>Available Tasks</h1>
                <div id="task-list" style="margin-top:20px"></div>
            </div>

            <!-- Wallet Section -->
            <div id="wallet" class="section">
                <h1>Withdrawal</h1>
                <div class="card" style="max-width:400px; margin-top:20px">
                    <select id="w-method">
                        <option value="Bkash">Bkash</option>
                        <option value="Nagad">Nagad</option>
                    </select>
                    <input type="number" id="w-amount" placeholder="Amount (Min 50)">
                    <input type="text" id="w-phone" placeholder="Phone Number">
                    <button class="btn btn-p" onclick="withdraw()">Submit Request</button>
                </div>
            </div>
        </div>
    </div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBVw5r9_S_0hkIwVL1SFafBkl6Dyb--I4M",
  authDomain: "skmy-e94c5.firebaseapp.com",
  databaseURL: "https://skmy-e94c5-default-rtdb.firebaseio.com",
  projectId: "skmy-e94c5",
  storageBucket: "skmy-e94c5.firebasestorage.app",
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// --- Auth Logic ---
function toggleAuth(isLogin) {
    document.getElementById('login-form').style.display = isLogin ? 'block' : 'none';
    document.getElementById('register-form').style.display = isLogin ? 'none' : 'block';
}

function register() {
    const email = document.getElementById('regEmail').value;
    const pass = document.getElementById('regPass').value;
    const name = document.getElementById('regName').value;
    const refBy = document.getElementById('refCodeInput').value;
    const myRef = Math.random().toString(36).substring(2,8).toUpperCase();

    auth.createUserWithEmailAndPassword(email, pass).then(res => {
        const uid = res.user.uid;
        db.ref('users/' + uid).set({
            name, email, balance: 0, refCode: myRef, status: 'active', role: 'user'
        });
        if(refBy) handleReferral(refBy);
        location.reload();
    }).catch(e => alert(e.message));
}

function handleReferral(code) {
    db.ref('users').orderByChild('refCode').equalTo(code).once('value', snap => {
        if(snap.exists()) {
            const refUid = Object.keys(snap.val())[0];
            db.ref('users/' + refUid + '/balance').transaction(b => (b || 0) + 5);
        }
    });
}

function login() {
    auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value)
    .catch(e => alert(e.message));
}

function logout() { auth.signOut().then(() => location.reload()); }

// --- UI Logic ---
auth.onAuthStateChanged(user => {
    if(user) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-wrapper').style.display = 'block';
        loadUserData(user.uid);
        loadTasks();
    }
});

function loadUserData(uid) {
    db.ref('users/' + uid).on('value', snap => {
        const d = snap.val();
        document.getElementById('u-name').innerText = d.name;
        document.getElementById('u-balance').innerText = d.balance;
        document.getElementById('u-refcode').innerText = d.refCode;
    });
}

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
    document.getElementById(id).classList.add('active-section');
}

function claimBonus() {
    const uid = auth.currentUser.uid;
    const today = new Date().toDateString();
    db.ref('users/'+uid).once('value', s => {
        if(s.val().lastClaim === today) return alert("Already claimed!");
        db.ref('users/'+uid).update({ balance: s.val().balance + 2, lastClaim: today });
        alert("৳ 2 Bonus Added!");
    });
}

function loadTasks() {
    db.ref('tasks').on('value', snap => {
        let html = '';
        snap.forEach(child => {
            const t = child.val();
            html += `<div class="card" style="margin-bottom:10px">
                <h3>${t.title}</h3>
                <p>Reward: ৳ ${t.reward}</p>
                <a href="${t.link}" target="_blank" class="btn btn-p" style="display:inline-block; width:auto; text-decoration:none" onclick="completeTask('${child.key}', ${t.reward})">Start Task</a>
            </div>`;
        });
        document.getElementById('task-list').innerHTML = html;
    });
}

function completeTask(tid, reward) {
    const uid = auth.currentUser.uid;
    db.ref('users/'+uid+'/balance').transaction(b => (b || 0) + reward);
    alert("Reward added!");
}

function withdraw() {
    const amount = parseInt(document.getElementById('w-amount').value);
    const phone = document.getElementById('w-phone').value;
    const uid = auth.currentUser.uid;

    db.ref('users/'+uid).once('value', s => {
        if(s.val().balance >= amount && amount >= 50) {
            db.ref('withdraws').push({ uid, amount, phone, status: 'pending', email: s.val().email });
            db.ref('users/'+uid).update({ balance: s.val().balance - amount });
            alert("Request Sent!");
        } else { alert("Check balance or minimum amount!"); }
    });
}
</script>
</body>
</html>
